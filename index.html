<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>🌤️ 晴雨预报 · 实时天气</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== 全局样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b1a2e 0%, #1b3a5c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .weather-app {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 30px 28px 40px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            color: #f0f8ff;
            transition: all 0.2s ease;
        }

        /* ===== 头部 & 搜索区 ===== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .app-header h1 {
            font-weight: 500;
            font-size: 1.8rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-header h1 i {
            color: #ffd966;
            font-size: 2rem;
        }

        .search-box {
            display: flex;
            flex: 1 1 260px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.2s;
        }
        .search-box:focus-within {
            background: rgba(255, 255, 255, 0.25);
            border-color: #7ec8e3;
            box-shadow: 0 0 0 3px rgba(126, 200, 227, 0.3);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 6px;
            font-size: 1rem;
            color: #fff;
            outline: none;
            min-width: 100px;
        }
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .search-box button {
            background: #5fa8d3;
            border: none;
            border-radius: 60px;
            padding: 10px 20px;
            font-weight: 600;
            color: #0b1a2e;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .search-box button:hover {
            background: #7ec8e3;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(94, 168, 211, 0.4);
        }
        .search-box button i {
            font-size: 1rem;
        }

        /* ===== 定位状态 & 错误 ===== */
        .geo-status {
            font-size: 0.85rem;
            opacity: 0.8;
            margin: 6px 0 12px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            cursor: pointer;
        }
        .geo-status i {
            color: #9ad0f5;
        }
        .geo-status:hover {
            opacity: 1;
        }

        .error-msg {
            color: #ffb3b3;
            background: rgba(220, 20, 60, 0.2);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: inline-block;
            backdrop-filter: blur(4px);
            margin-bottom: 10px;
        }

        /* ===== 当前天气卡片 ===== */
        .current-weather {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 24px 24px 30px;
            margin: 18px 0 28px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .weather-icon {
            font-size: 4.5rem;
            line-height: 1;
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3));
        }
        .weather-temp {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .weather-temp small {
            font-size: 1.8rem;
            font-weight: 300;
            opacity: 0.7;
        }
        .weather-desc {
            font-size: 1.4rem;
            font-weight: 400;
            text-transform: capitalize;
            margin-top: 4px;
            opacity: 0.9;
        }
        .weather-extra {
            text-align: right;
            line-height: 1.8;
            font-size: 1rem;
            opacity: 0.85;
        }
        .weather-extra i {
            width: 24px;
            color: #b5dffa;
        }

        /* ===== 未来预报 ===== */
        .forecast-title {
            font-weight: 400;
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin: 18px 0 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.8;
        }
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 14px;
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 18px 6px 14px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.2s;
        }
        .forecast-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
        }
        .forecast-day {
            font-weight: 400;
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 6px;
        }
        .forecast-icon {
            font-size: 2.2rem;
            margin: 8px 0;
        }
        .forecast-temps {
            display: flex;
            justify-content: center;
            gap: 14px;
            font-size: 1rem;
            font-weight: 400;
        }
        .forecast-temps .high {
            color: #ffb07a;
        }
        .forecast-temps .low {
            color: #9ac7e7;
        }
        .forecast-desc {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 30px 10px;
            opacity: 0.6;
            font-size: 1.1rem;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 500px) {
            .weather-app {
                padding: 20px 16px 30px;
                border-radius: 32px;
            }
            .app-header {
                flex-direction: column;
                align-items: stretch;
            }
            .app-header h1 {
                font-size: 1.5rem;
                justify-content: center;
            }
            .search-box {
                padding: 4px 4px 4px 16px;
            }
            .search-box button {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            .current-weather {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
            .weather-extra {
                text-align: left;
                width: 100%;
            }
            .weather-temp {
                font-size: 2.8rem;
            }
            .weather-icon {
                font-size: 3.6rem;
            }
            .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="weather-app" id="app">
        <!-- 头部 -->
        <header class="app-header">
            <h1><i class="fas fa-cloud-sun"></i> 晴雨预报</h1>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="输入城市名称（如 佛山）..." aria-label="城市搜索">
                <button id="searchBtn"><i class="fas fa-search"></i> 搜索</button>
            </div>
        </header>

        <!-- 定位状态 & 错误 -->
        <div class="geo-status" id="geoStatus">
            <i class="fas fa-map-pin"></i> <span id="locationStatus">点击定位或输入城市</span>
        </div>
        <div id="errorContainer" class="error-msg" style="display: none;"></div>

        <!-- 当前天气 -->
        <section class="current-weather" id="currentWeather">
            <div class="weather-main">
                <div class="weather-icon" id="weatherIcon">☀️</div>
                <div>
                    <div class="weather-temp" id="tempDisplay">-- <small>°C</small></div>
                    <div class="weather-desc" id="descDisplay">--</div>
                </div>
            </div>
            <div class="weather-extra" id="extraInfo">
                <div><i class="fas fa-tint"></i> 湿度: --%</div>
                <div><i class="fas fa-wind"></i> 风速: -- km/h</div>
                <div><i class="fas fa-city"></i> <span id="cityNameDisplay">--</span></div>
            </div>
        </section>

        <!-- 未来预报 -->
        <div class="forecast-title"><i class="fas fa-calendar-alt"></i> 未来 5 天预报</div>
        <div class="forecast-grid" id="forecastGrid">
            <div class="empty-state">输入城市查看天气 ✨</div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ===== DOM 引用 =====
            const cityInput = document.getElementById('cityInput');
            const searchBtn = document.getElementById('searchBtn');
            const weatherIcon = document.getElementById('weatherIcon');
            const tempDisplay = document.getElementById('tempDisplay');
            const descDisplay = document.getElementById('descDisplay');
            const extraInfo = document.getElementById('extraInfo');
            const cityNameDisplay = document.getElementById('cityNameDisplay');
            const forecastGrid = document.getElementById('forecastGrid');
            const geoStatus = document.getElementById('locationStatus');
            const errorContainer = document.getElementById('errorContainer');

            // ===== 配置 (请替换为您自己的 OpenWeatherMap API Key) =====
            const API_KEY = 'e83fc0ee838ff94aaed6ca69b65ba09d';
            const BASE_URL = 'https://api.openweathermap.org/data/2.5';
            const GEO_URL = 'https://api.openweathermap.org/geo/1.0/direct';

            // ===== 工具函数 =====
            function showError(msg) {
                errorContainer.style.display = 'block';
                errorContainer.textContent = '⚠️ ' + msg;
                setTimeout(() => { errorContainer.style.display = 'none'; }, 6000);
            }

            function clearError() {
                errorContainer.style.display = 'none';
            }

            // 获取天气图标
            function getWeatherIcon(iconCode) {
                const map = {
                    '01d': 'fa-solid fa-sun',
                    '01n': 'fa-solid fa-moon',
                    '02d': 'fa-solid fa-cloud-sun',
                    '02n': 'fa-solid fa-cloud-moon',
                    '03d': 'fa-solid fa-cloud',
                    '03n': 'fa-solid fa-cloud',
                    '04d': 'fa-solid fa-cloud',
                    '04n': 'fa-solid fa-cloud',
                    '09d': 'fa-solid fa-cloud-rain',
                    '09n': 'fa-solid fa-cloud-rain',
                    '10d': 'fa-solid fa-cloud-sun-rain',
                    '10n': 'fa-solid fa-cloud-moon-rain',
                    '11d': 'fa-solid fa-cloud-bolt',
                    '11n': 'fa-solid fa-cloud-bolt',
                    '13d': 'fa-solid fa-snowflake',
                    '13n': 'fa-solid fa-snowflake',
                    '50d': 'fa-solid fa-smog',
                    '50n': 'fa-solid fa-smog',
                };
                return map[iconCode] || 'fa-solid fa-cloud';
            }

            // 格式化日期
            function formatForecastDate(timestamp) {
                const d = new Date(timestamp * 1000);
                const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                return weekdays[d.getDay()] + ' ' + (d.getMonth() + 1).toString().padStart(2, '0') + '/' + d.getDate()
                    .toString().padStart(2, '0');
            }

            // ===== 核心功能：地理编码（支持中文城市名） =====
            async function geocodeCity(cityName) {
                try {
                    const url = `${GEO_URL}?q=${encodeURIComponent(cityName)}&limit=1&appid=${API_KEY}`;
                    const response = await fetch(url);
                    if (!response.ok) return null;
                    const data = await response.json();
                    if (data.length === 0) return null;
                    return data[0]; // { name, lat, lon, country, state }
                } catch {
                    return null;
                }
            }

            // ===== 获取天气数据（先地理编码，再用经纬度查询） =====
            async function fetchWeather(city) {
                if (!city || city.trim() === '') {
                    showError('请输入城市名称');
                    return null;
                }
                clearError();

                try {
                    // 1. 地理编码：将中文城市名转为经纬度
                    const geoData = await geocodeCity(city.trim());
                    if (!geoData) {
                        // 尝试在输入后加上 "CN" 再试一次
                        const geoData2 = await geocodeCity(city.trim() + ',CN');
                        if (!geoData2) {
                            throw new Error('未找到该城市，请检查名称或尝试使用拼音（如 Foshan）');
                        }
                        var finalGeo = geoData2;
                    } else {
                        var finalGeo = geoData;
                    }

                    const { lat, lon, name, country } = finalGeo;
                    const displayName = `${name}${country ? ', ' + country : ''}`;

                    // 2. 使用经纬度获取当前天气
                    const currentRes = await fetch(
                        `${BASE_URL}/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=zh_cn`
                    );
                    if (!currentRes.ok) throw new Error('获取天气数据失败');
                    const currentData = await currentRes.json();
                    currentData.name = displayName;

                    // 3. 使用经纬度获取5天预报
                    const forecastRes = await fetch(
                        `${BASE_URL}/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=zh_cn`
                    );
                    if (!forecastRes.ok) throw new Error('获取预报数据失败');
                    const forecastData = await forecastRes.json();

                    return { current: currentData, forecast: forecastData };
                } catch (error) {
                    showError(error.message);
                    return null;
                }
            }

            // ===== 渲染 UI =====
            function renderWeather(data) {
                if (!data) {
                    weatherIcon.textContent = '☀️';
                    tempDisplay.innerHTML = '-- <small>°C</small>';
                    descDisplay.textContent = '--';
                    cityNameDisplay.textContent = '--';
                    extraInfo.innerHTML =
                        `<div><i class="fas fa-tint"></i> 湿度: --%</div>
                                 <div><i class="fas fa-wind"></i> 风速: -- km/h</div>
                                 <div><i class="fas fa-city"></i> <span id="cityNameDisplay">--</span></div>`;
                    forecastGrid.innerHTML = `<div class="empty-state">输入城市查看天气 ✨</div>`;
                    return;
                }

                const { current, forecast } = data;

                // 当前天气
                const { main, weather, wind, name } = current;
                const temp = Math.round(main.temp);
                const desc = weather[0].description;
                const iconCode = weather[0].icon;

                weatherIcon.innerHTML =
                    `<i class="${getWeatherIcon(iconCode)}" style="font-size:3.8rem; color:#ffde94;"></i>`;
                tempDisplay.innerHTML = `${temp} <small>°C</small>`;
                descDisplay.textContent = desc;
                cityNameDisplay.textContent = name;

                extraInfo.innerHTML = `
                    <div><i class="fas fa-tint"></i> 湿度: ${main.humidity}%</div>
                    <div><i class="fas fa-wind"></i> 风速: ${Math.round(wind.speed * 3.6)} km/h</div>
                    <div><i class="fas fa-city"></i> ${name}</div>
                `;

                // 未来5天预报
                const dailyMap = new Map();
                if (forecast && forecast.list) {
                    forecast.list.forEach(item => {
                        const date = new Date(item.dt * 1000);
                        const hour = date.getHours();
                        const dateStr = date.toDateString();
                        if (!dailyMap.has(dateStr) || Math.abs(hour - 12) < Math.abs(dailyMap.get(dateStr).hour - 12)) {
                            dailyMap.set(dateStr, { ...item, hour });
                        }
                    });
                }

                const sorted = Array.from(dailyMap.values()).slice(0, 5);
                if (sorted.length === 0) {
                    forecastGrid.innerHTML = `<div class="empty-state">暂无预报数据</div>`;
                    return;
                }

                forecastGrid.innerHTML = sorted.map(day => {
                    const dayName = formatForecastDate(day.dt);
                    const tempHigh = Math.round(day.main.temp_max);
                    const tempLow = Math.round(day.main.temp_min);
                    const descShort = day.weather[0].description;
                    const iconCodeDay = day.weather[0].icon;
                    return `
                        <div class="forecast-card">
                            <div class="forecast-day">${dayName}</div>
                            <div class="forecast-icon"><i class="${getWeatherIcon(iconCodeDay)}" style="color:#f5e56b;"></i></div>
                            <div class="forecast-temps">
                                <span class="high">${tempHigh}°</span>
                                <span class="low">${tempLow}°</span>
                            </div>
                            <div class="forecast-desc">${descShort}</div>
                        </div>
                    `;
                }).join('');
            }

            // ===== 搜索逻辑 =====
            async function searchWeather(city) {
                if (!city || city.trim() === '') {
                    showError('请输入城市名称');
                    return;
                }
                const trimmed = city.trim();
                localStorage.setItem('lastCity', trimmed);
                const data = await fetchWeather(trimmed);
                if (data) {
                    renderWeather(data);
                }
            }

            function handleSearch() {
                const city = cityInput.value.trim();
                if (city) {
                    searchWeather(city);
                } else {
                    showError('请输入城市名称');
                }
            }

            // ===== 地理位置定位 =====
            async function geoLocate() {
                if (!navigator.geolocation) {
                    geoStatus.textContent = '浏览器不支持定位';
                    return;
                }
                geoStatus.textContent = '定位中...';
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const { latitude, longitude } = position.coords;
                        geoStatus.textContent = `📍 定位成功`;
                        try {
                            // 使用经纬度获取城市名
                            const res = await fetch(
                                `${BASE_URL}/weather?lat=${latitude}&lon=${longitude}&appid=${API_KEY}&units=metric&lang=zh_cn`
                            );
                            if (!res.ok) throw new Error('定位天气获取失败');
                            const data = await res.json();
                            const city = data.name;
                            if (city) {
                                localStorage.setItem('lastCity', city);
                                const fullData = await fetchWeather(city);
                                if (fullData) renderWeather(fullData);
                                cityInput.value = city;
                            } else {
                                throw new Error('未能识别城市');
                            }
                        } catch (err) {
                            geoStatus.textContent = '⚠️ 定位天气失败';
                            showError(err.message);
                        }
                    },
                    (err) => {
                        geoStatus.textContent = '⚠️ 定位失败，请手动搜索';
                        console.warn('Geolocation error:', err);
                    }, { enableHighAccuracy: true, timeout: 8000 }
                );
            }

            // ===== 初始化 =====
            function init() {
                const lastCity = localStorage.getItem('lastCity');
                if (lastCity) {
                    cityInput.value = lastCity;
                    searchWeather(lastCity);
                } else {
                    renderWeather(null);
                    // 默认尝试定位
                    geoLocate();
                }

                // 事件绑定
                searchBtn.addEventListener('click', handleSearch);
                cityInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        handleSearch();
                    }
                });

                // 点击定位状态重新定位
                document.getElementById('geoStatus').addEventListener('click', geoLocate);
            }

            // 启动
            init();
        })();
    </script>
</body>
</html>
